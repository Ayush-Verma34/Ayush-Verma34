<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="3" viewBox="0 0 1200 3" preserveAspectRatio="none">
  <defs>
    <linearGradient id="grad" x1="-100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#052e16" />
      <stop offset="40%" stop-color="#10b981" />
      <stop offset="50%" stop-color="#34d399" />
      <stop offset="60%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#052e16" />
      <animate attributeName="x1" from="-100%" to="100%" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="x2" from="0%" to="200%" dur="2.5s" repeatCount="indefinite" />
    </linearGradient>
  </defs>
  <rect width="1200" height="3" fill="url(#grad)" rx="1.5" />
</svg>
